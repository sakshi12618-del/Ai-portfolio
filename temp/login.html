<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AI Portfolio</title>
    <style>
        :root {
            --bg-start: #0a1223;
            --bg-end: #1f2a50;
            --surface: rgba(30, 41, 59, 0.92);
            --surface-strong: rgba(30, 41, 59, 0.95);
            --border: rgba(34, 211, 238, 0.2);
            --accent: #22d3ee;
            --accent-strong: #06b6d4;
            --text: #f1f5f9;
            --muted: #94a3b8;
            --shadow: 0 25px 80px rgba(0, 0, 0, 0.4);
        }

        * {
            box-sizing: border-box;
        }

        body {
    margin: 0;
    min-height: 100vh;
    font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

    background: 
        linear-gradient(rgba(10,18,35,0.7), rgba(31,42,80,0.7)),
        url('/static/images/Login.jpeg');  /* 👈 THIS IS IMPORTANT */

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    color: var(--text);
    display: grid;
    place-items: center;
    padding: 24px;
}

        .container {
            width: min(520px, 100%);
            background: var(--surface);
            border-radius: 28px;
            box-shadow: var(--shadow);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(16px);
        }

        .hero {
            padding: 32px;
            background: linear-gradient(135deg, rgba(34, 211, 238, 0.2), rgba(6, 182, 212, 0.15));
            border-bottom: 1px solid rgba(34, 211, 238, 0.2);
            color: white;
        }

        .hero h1 {
            margin: 0;
            font-size: 2rem;
            letter-spacing: -0.03em;
        }

        .hero p {
            margin: 14px 0 0;
            line-height: 1.65;
            color: rgba(255, 255, 255, 0.9);
            max-width: 520px;
        }

        .content {
            padding: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: #22d3ee;
            font-size: 0.95rem;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 16px;
            border: 1px solid rgba(34, 211, 238, 0.2);
            background: rgba(15, 23, 42, 0.6);
            font-size: 1rem;
            color: white;
            transition: border-color 0.25s ease, box-shadow 0.25s ease;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        input:focus {
            outline: none;
            border-color: #22d3ee;
            box-shadow: 0 0 0 6px rgba(34, 211, 238, 0.15);
            background: rgba(15, 23, 42, 0.8);
        }

        .actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            font-size: 0.95rem;
        }

        .actions a {
            color: #22d3ee;
            text-decoration: none;
            font-weight: 700;
        }

        .actions a:hover {
            text-decoration: underline;
            color: #06b6d4;
        }

        button {
            width: 100%;
            padding: 15px 18px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #22d3ee, #06b6d4);
            color: #0f172a;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 18px 40px rgba(34, 211, 238, 0.35);
        }

        .footer {
            margin-top: 20px;
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.7);
            text-align: center;
        }

        .footer a {
            color: #22d3ee;
            font-weight: 700;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
            color: #06b6d4;
        }

        @media (max-width: 480px) {
            .hero, .content {
                padding: 24px;
            }

            .hero h1 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>AI Portfolio Login</h1>
            <p>Sign in to unlock smarter resume analysis, role recommendations, and performance tracking.</p>
        </div>
        <div class="content">
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input id="username" type="text" name="username" placeholder="Enter your username" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input id="password" type="password" name="password" placeholder="Enter your password" autocomplete="current-password" required>
                </div>
                <div class="actions">
                    <span></span>
                    <a href="/register">Create an account</a>
                </div>
                <button type="submit">Sign In</button>
            </form>
            <p class="footer">New to AI Portfolio? <a href="/register">Register now</a> and start building a stronger career profile.</p>
        </div>
    </div>
    <script>
document.getElementById("loginForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    try {
        const formData = new URLSearchParams();
        formData.append('username', username);
        formData.append('password', password);

        const res = await fetch("/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded"
            },
            body: formData.toString()
        });

        const data = await res.json();

        if (data.error) {
            alert(data.error);
        } else if (data.message) {
            alert(data.message);
            if (data.message.includes("successful")) {
                window.location.href = "/dashboard";
            }
        }
    } catch (error) {
        console.error(error);
        alert("Server error. Please try again.");
    }
});
</script>
    }
});
</script>
</body>
</html>
